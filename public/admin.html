<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Enquiries | I.S. Memorial School</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628; --gold: #c8952a; --gold-light: #e8b84b;
    --cream: #fdf6e3; --white: #fff; --text-muted: #6b7280;
    --green: #16a34a; --red: #dc2626; --blue: #2563eb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; background: #f1f5f9; color: #1a1a2e; }
  header {
    background: var(--navy); color: var(--white);
    padding: 18px 40px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid var(--gold);
  }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--gold); }
  header span { font-size: 0.82rem; color: #94a3b8; }
  .container { max-width: 1200px; margin: 40px auto; padding: 0 24px; }
  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-bottom: 32px; }
  .stat-card {
    background: var(--white); border-radius: 10px; padding: 24px;
    border-left: 4px solid var(--gold); box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .stat-card.green { border-color: var(--green); }
  .stat-card.blue { border-color: var(--blue); }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; }
  .stat-label { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }
  .toolbar {
    background: var(--white); border-radius: 10px; padding: 16px 20px;
    display: flex; gap: 12px; align-items: center; margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex-wrap: wrap;
  }
  .toolbar input {
    flex: 1; min-width: 200px; padding: 10px 16px; border: 1px solid #e5e7eb;
    border-radius: 6px; font-family: 'Nunito', sans-serif; font-size: 0.9rem;
  }
  .toolbar input:focus { outline: none; border-color: var(--gold); }
  .filter-btn {
    padding: 10px 18px; border: 1px solid #e5e7eb; border-radius: 6px;
    background: var(--white); font-family: 'Nunito', sans-serif; font-size: 0.85rem;
    cursor: pointer; font-weight: 600; transition: all 0.2s;
  }
  .filter-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
  .filter-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }
  .refresh-btn {
    padding: 10px 18px; background: var(--gold); color: var(--navy);
    border: none; border-radius: 6px; font-family: 'Nunito', sans-serif;
    font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: background 0.2s;
  }
  .refresh-btn:hover { background: var(--gold-light); }
  .table-wrap { background: var(--white); border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--navy); color: var(--white); }
  th { padding: 14px 16px; text-align: left; font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase; }
  td { padding: 14px 16px; font-size: 0.9rem; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fdf6e3; }
  .badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge.new { background: #dbeafe; color: #1d4ed8; }
  .badge.contacted { background: #fef9c3; color: #a16207; }
  .badge.resolved { background: #dcfce7; color: #15803d; }
  .action-btn {
    padding: 5px 10px; border-radius: 4px; font-size: 0.78rem;
    font-weight: 700; cursor: pointer; border: none; font-family: 'Nunito', sans-serif;
    margin-right: 4px; transition: opacity 0.2s;
  }
  .action-btn:hover { opacity: 0.8; }
  .btn-contact { background: #fef9c3; color: #a16207; }
  .btn-resolve { background: #dcfce7; color: #15803d; }
  .btn-delete { background: #fee2e2; color: #dc2626; }
  .empty { text-align: center; padding: 60px; color: var(--text-muted); font-size: 1rem; }
  .date-cell { font-size: 0.8rem; color: var(--text-muted); }
  #loading { text-align: center; padding: 40px; color: var(--text-muted); }
</style>
</head>
<body>

<header>
  <h1>📋 Enquiries Admin Panel</h1>
  <span>I.S. Memorial Public Sr. Sec. School</span>
</header>

<div class="container">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total Enquiries</div></div>
    <div class="stat-card green"><div class="stat-num" id="stat-new">—</div><div class="stat-label">New (Unread)</div></div>
    <div class="stat-card blue"><div class="stat-num" id="stat-resolved">—</div><div class="stat-label">Resolved</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍  Search by name, phone, or email…">
    <button class="filter-btn active" data-status="">All</button>
    <button class="filter-btn" data-status="new">New</button>
    <button class="filter-btn" data-status="contacted">Contacted</button>
    <button class="filter-btn" data-status="resolved">Resolved</button>
    <button class="refresh-btn" onclick="loadEnquiries()">↻ Refresh</button>
  </div>

  <div class="table-wrap">
    <div id="loading">Loading enquiries…</div>
    <table id="enquiriesTable" style="display:none">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Enquiry For</th>
          <th>Message</th>
          <th>Date</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="emptyMsg" class="empty" style="display:none">No enquiries found.</div>
  </div>
</div>

<script>
  let allEnquiries = [];
  let activeFilter = '';

  async function loadEnquiries() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('enquiriesTable').style.display = 'none';
    document.getElementById('emptyMsg').style.display = 'none';

    try {
      const res = await fetch('/api/enquiries');
      const data = await res.json();
      allEnquiries = data.enquiries || [];
      updateStats();
      renderTable();
    } catch (err) {
      document.getElementById('loading').textContent = '❌ Failed to load. Is the server running?';
    }
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = allEnquiries.length;
    document.getElementById('stat-new').textContent = allEnquiries.filter(e => e.status === 'new').length;
    document.getElementById('stat-resolved').textContent = allEnquiries.filter(e => e.status === 'resolved').length;
  }

  function renderTable() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allEnquiries.filter(e => {
      const matchStatus = !activeFilter || e.status === activeFilter;
      const matchSearch = !search ||
        (e.full_name || '').toLowerCase().includes(search) ||
        (e.phone || '').toLowerCase().includes(search) ||
        (e.email || '').toLowerCase().includes(search);
      return matchStatus && matchSearch;
    });

    document.getElementById('loading').style.display = 'none';

    if (filtered.length === 0) {
      document.getElementById('enquiriesTable').style.display = 'none';
      document.getElementById('emptyMsg').style.display = 'block';
      return;
    }

    document.getElementById('emptyMsg').style.display = 'none';
    document.getElementById('enquiriesTable').style.display = 'table';

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = filtered.map(e => `
      <tr id="row-${e.id}">
        <td>${e.id}</td>
        <td><strong>${e.full_name}</strong></td>
        <td>${e.phone}</td>
        <td>${e.email || '—'}</td>
        <td>${e.enquiry_for || '—'}</td>
        <td style="max-width:200px;">${e.message || '—'}</td>
        <td class="date-cell">${new Date(e.submitted_at).toLocaleString('en-IN')}</td>
        <td><span class="badge ${e.status}">${e.status}</span></td>
        <td>
          ${e.status !== 'contacted' ? `<button class="action-btn btn-contact" onclick="updateStatus(${e.id},'contacted')">Contacted</button>` : ''}
          ${e.status !== 'resolved' ? `<button class="action-btn btn-resolve" onclick="updateStatus(${e.id},'resolved')">Resolve</button>` : ''}
          <button class="action-btn btn-delete" onclick="deleteEnquiry(${e.id})">Delete</button>
        </td>
      </tr>
    `).join('');
  }

  async function updateStatus(id, status) {
    await fetch(`/api/enquiries/${id}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    const e = allEnquiries.find(e => e.id === id);
    if (e) e.status = status;
    updateStats();
    renderTable();
  }

  async function deleteEnquiry(id) {
    if (!confirm('Delete this enquiry?')) return;
    await fetch(`/api/enquiries/${id}`, { method: 'DELETE' });
    allEnquiries = allEnquiries.filter(e => e.id !== id);
    updateStats();
    renderTable();
  }

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      activeFilter = this.dataset.status;
      renderTable();
    });
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', renderTable);

  loadEnquiries();
</script>
</body>
</html>
